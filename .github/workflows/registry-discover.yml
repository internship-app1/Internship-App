name: Discover New Companies

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target backend environment'
        type: choice
        options:
          - production
          - staging
        default: production

jobs:
  discover:
    runs-on: ubuntu-latest
    # Scheduled runs carry no input -> default to production. Manual dispatch can
    # target staging. The environment scopes which API_URL secret is injected.
    environment: ${{ github.event.inputs.environment || 'production' }}
    timeout-minutes: 120
    steps:
      - name: Trigger company registry refresh
        run: |
          curl -sS -X POST "${{ secrets.API_URL }}/api/crawl/discover-companies" \
            -H "X-Api-Key: ${{ secrets.INTERNSHIP_MATCHER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 7000 --retry 3 --retry-delay 15 --retry-connrefused \
            --fail-with-body
