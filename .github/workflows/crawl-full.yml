name: Crawl Full

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Trigger full ATS crawl
        run: |
          curl -sS -X POST "${{ secrets.API_URL }}/api/crawl/full" \
            -H "X-Api-Key: ${{ secrets.INTERNSHIP_MATCHER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 3300 --retry 3 --retry-delay 15 --retry-connrefused \
            --fail-with-body
