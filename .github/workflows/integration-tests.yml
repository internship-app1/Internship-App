name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Which suite to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - claude
          - s3
          - e2e

jobs:
  integration:
    name: Integration Tests (${{ github.event.inputs.test_suite || 'all' }})
    runs-on: ubuntu-latest

    env:
      CLAUDE_API_KEY:          "${{ secrets.CLAUDE_API_KEY }}"
      AWS_ACCESS_KEY_ID:       "${{ secrets.AWS_ACCESS_KEY_ID }}"
      AWS_SECRET_ACCESS_KEY:   "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
      AWS_BUCKET_NAME:         "${{ secrets.AWS_BUCKET_NAME }}"
      AWS_REGION:              "${{ secrets.AWS_REGION }}"
      DATABASE_URL:            "sqlite:///:memory:"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            tesseract-ocr tesseract-ocr-eng \
            texlive-latex-base texlive-fonts-recommended texlive-latex-extra

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      # -----------------------------------------------------------------------
      # Run only the requested suite (defaults to all)
      # -----------------------------------------------------------------------

      - name: Run Claude API tests
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'claude' }}
        run: pytest tests/integration/test_claude_api.py -v --tb=short

      - name: Run S3 tests
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 's3' }}
        run: pytest tests/integration/test_s3_integration.py -v --tb=short

      - name: Run end-to-end resume tailor tests
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'e2e' }}
        run: pytest tests/integration/test_resume_tailor_e2e.py -v --tb=short
