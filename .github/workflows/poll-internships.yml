name: Sync SimplifyJobs → Supabase

on:
  schedule:
    - cron: '37 * * * *'  # hourly at :37 — off-peak minute avoids GitHub queue delays
  workflow_dispatch:        # manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Trigger incremental job sync
        run: python pipeline/sync_jobs.py
        env:
          INTERNSHIP_MATCHER_API_KEY: ${{ secrets.INTERNSHIP_MATCHER_API_KEY }}
